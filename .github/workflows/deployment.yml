name: Build and Deploy

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'archive/**'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin master

      - name: Compress changed images
        if: github.event_name == 'push'
        run: |
          sudo apt-get install -y pngquant jpegoptim webp
          git diff --name-only HEAD~1 -- '*.png' '*.jpg' '*.jpeg' '*.webp' 2>/dev/null | while read f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.png) pngquant --ext .png --speed 1 --quality=65-80 --force "$f" ;;
              *.jpg|*.jpeg) jpegoptim --strip-all --max=85 "$f" ;;
              *.webp) cwebp -q 80 "$f" -o "$f" ;;
            esac
          done

      - name: Replace Image Paths in Markdown
        if: github.event_name == 'push'
        run: |
          find content -name '*.md' | while read file; do
              sed -i 's/\(\!\[.*\]\)(\(\.\.\/\)\+assets\/images\/\(Y[0-9]*Q[0-9]*\)\/\(.*\))/\1(https:\/\/raw.githubusercontent.com\/lxulxu\/lxulxu.github.io\/master\/assets\/images\/\3\/\4?raw=true)/g' "$file"
              sed -i 's/<img src="\(\.\.\/\)\+assets\/images\/\(Y[0-9]*Q[0-9]*\)\/\([^"]*\)"/<img src="https:\/\/raw.githubusercontent.com\/lxulxu\/lxulxu.github.io\/master\/assets\/images\/\2\/\3?raw=true"/g' "$file"
          done

      - name: Douban Sync
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: lxulxu/douban-track@v1
        with:
          rss_url: ${{ secrets.RSS_URL }}
          output_dir: content/posts
          data_dir: data

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git diff --staged --quiet || git commit -m "Update site content"
          git push

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
